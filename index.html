<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Budget</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .screen { display: none; }
        .screen.active { display: block; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4A5568; border-radius: 4px; }
        .sortable-ghost { opacity: 0.5; background-color: #CBD5E1 !important; }
        .dark .sortable-ghost { background-color: #475569 !important; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'brand': '#4A5568', 'brand-dark': '#2D3748', } } } }
    </script>
</head>
<body class="bg-slate-900 dark:bg-slate-900 flex flex-col items-center justify-center min-h-screen transition-colors duration-300 p-4">

    <div class="w-full max-w-xl mx-auto transition-all duration-300 flex-grow flex flex-col justify-center">

        <!-- Intro Screen -->
        <div id="intro-screen" class="screen active">
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-8 md:p-10 text-center">
                <div class="w-36 h-36 mx-auto mb-6 bg-brand rounded-full flex items-center justify-center">
                    <svg class="w-20 h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H19m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-gray-200">Shopping Budget</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-4 mb-8">Track your Shopping Budget</p>
                <button id="start-btn" onclick="showScreen('budget-screen')" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:scale-105 shadow-md">Start</button>
            </div>
        </div>

        <!-- Main Budget Screen -->
        <div id="budget-screen" class="screen">
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-6 sm:p-8 md:p-10 text-center relative">
                
                <div class="flex justify-between items-center mb-6 sm:mb-8 relative">
                    <button onclick="toggleMenu()" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none p-2 rounded-lg transition-colors">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div id="dropdownMenu" class="hidden absolute top-14 left-0 bg-white dark:bg-slate-700 rounded-lg shadow-xl border border-gray-200 dark:border-slate-600 w-48 py-2 z-10 text-left">
                        <button onclick="saveList(); toggleMenu()" class="w-full px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-600 text-left font-medium">Save Backup</button>
                        <button onclick="document.getElementById('fileInput').click(); toggleMenu()" class="w-full px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-600 text-left font-medium">Import Backup</button>
                        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importList(event)">
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-200">Shopping Budget</h1>
                    <button onclick="toggleTheme()" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none p-2 rounded-lg transition-colors">
                        <svg id="icon-sun" class="w-7 h-7 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="icon-moon" class="w-7 h-7 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>

                <div class="bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl p-5 sm:p-6 text-center mb-6 sm:mb-8">
                    <p class="text-sm font-medium text-slate-800 dark:text-slate-300">Total Spent:</p>
                    <p id="totalDisplay" class="text-4xl font-bold text-brand dark:text-slate-300 mt-1 mb-3 transition-colors duration-300">£0.00</p>
                    <div class="flex items-center justify-center gap-2 mt-2 pt-3 border-t border-slate-300 dark:border-slate-600">
                        <span class="text-sm font-semibold text-gray-600 dark:text-gray-400">Budget:</span>
                        <div id="budgetInputContainer" class="flex items-center gap-2">
                            <div class="relative w-24"><span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm">£</span><input type="number" id="budgetInput" placeholder="0.00" step="0.01" onkeypress="handleKeyPress(event)" class="w-full py-1 pl-5 pr-1 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 text-sm font-medium rounded-md border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-1 focus:ring-brand"></div>
                            <button onclick="setBudget()" class="bg-brand hover:bg-brand-dark text-white text-xs font-bold py-1.5 px-3 rounded-md transition-colors shadow-sm">Set</button>
                        </div>
                        <div id="budgetDisplayContainer" class="hidden items-center gap-1">
                            <span id="budgetDisplay" class="text-sm font-bold text-brand-dark dark:text-slate-200 cursor-pointer border-b border-dashed border-gray-400 dark:border-gray-500 hover:text-brand" onclick="editBudget()" title="Click to change budget">£0.00</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-2.5 mb-6 sm:mb-8">
                    <input type="text" id="nameInput" placeholder="Item Name" onkeypress="handleKeyPress(event)" class="w-full sm:w-[40%] py-2.5 px-3 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-medium rounded-lg border-2 border-transparent focus:outline-none focus:ring-2 focus:ring-brand focus:bg-white dark:focus:bg-gray-600 text-sm">
                    <div class="flex flex-col sm:flex-row gap-2.5 sm:gap-2 w-full sm:w-[60%] items-center sm:items-stretch">
                        <div class="flex flex-row justify-center gap-2 w-full sm:w-auto">
                            <div class="relative w-24 sm:w-20 flex-shrink-0"><input type="number" id="priceInput" placeholder="Price" step="0.01" onkeypress="handleKeyPress(event)" class="w-full py-2.5 pl-6 pr-1 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-medium rounded-lg border-2 border-transparent focus:outline-none focus:ring-2 focus:ring-brand focus:bg-white dark:focus:bg-gray-600 text-sm"><span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 font-bold text-sm">£</span></div>
                            <input type="text" id="shopInput" placeholder="Shop Name" onkeypress="handleKeyPress(event)" class="w-28 py-2.5 px-2 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-medium rounded-lg border-2 border-transparent focus:outline-none focus:ring-2 focus:ring-brand focus:bg-white dark:focus:bg-gray-600 text-sm flex-shrink-0">
                            <input type="number" id="qtyInput" placeholder="Qty" value="1" min="1" onkeypress="handleKeyPress(event)" class="w-14 sm:w-12 py-2.5 px-1 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-medium rounded-lg text-center border-2 border-transparent focus:outline-none focus:ring-2 focus:ring-brand focus:bg-white dark:focus:bg-gray-600 text-sm flex-shrink-0" title="Quantity">
                        </div>
                        <button onclick="addItem()" class="px-6 sm:px-3 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg transition-transform transform hover:scale-105 shadow-md text-sm sm:flex-grow flex-shrink-0">Add</button>
                    </div>
                </div>

                <div id="listPanel" class="space-y-3.5 text-left max-h-72 overflow-y-auto custom-scroll pr-2 border-t border-gray-200 dark:border-slate-700 pt-5"></div>

                <div id="sortControls" class="hidden mt-4 pt-4 border-t border-gray-200 dark:border-slate-700 flex justify-between items-center transition-all duration-300">
                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Sort by:</span>
                    <div class="flex gap-1.5 ml-auto">
                        <button onclick="resetSort()" class="text-xs font-medium bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-700 dark:text-gray-200 py-1.5 px-3 rounded-md transition-colors shadow-sm">Original</button>
                        <button onclick="sortItems('shop')" class="text-xs font-medium bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-700 dark:text-gray-200 py-1.5 px-3 rounded-md transition-colors shadow-sm">Shop</button>
                        <button onclick="sortItems('price')" class="text-xs font-medium bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-700 dark:text-gray-200 py-1.5 px-3 rounded-md transition-colors shadow-sm">Price</button>
                        <button onclick="sortItems('name')" class="text-xs font-medium bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-700 dark:text-gray-200 py-1.5 px-3 rounded-md transition-colors shadow-sm">Name</button>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center mt-6 mb-2"><p class="text-gray-400 dark:text-gray-500 text-sm font-medium">Disclaimer: These are just estimates.</p></footer>
    </div>

    <script>
        let budget = 0, items = [], initialItems = [], sortableInstance = null;
        let lastSort = { criteria: null, ascending: true };

        function showScreen(s) { document.querySelectorAll('.screen').forEach(el => el.classList.remove('active')); document.getElementById(s).classList.add('active'); }
        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        function updateUI() {
            const total = items.reduce((sum, i) => sum + (i.price * i.qty), 0);
            const totalEl = document.getElementById('totalDisplay');
            totalEl.textContent = `£${total.toFixed(2)}`;
            if (budget > 0) {
                document.getElementById('budgetDisplay').textContent = `£${budget.toFixed(2)}`;
                document.getElementById('budgetInputContainer').classList.add('hidden');
                document.getElementById('budgetDisplayContainer').classList.remove('hidden');
                document.getElementById('budgetDisplayContainer').classList.add('flex');
                totalEl.classList.remove('text-brand', 'dark:text-slate-300', 'text-green-500', 'text-red-500');
                totalEl.classList.add(total > budget ? 'text-red-500' : 'text-green-500');
            } else {
                document.getElementById('budgetInputContainer').classList.remove('hidden');
                document.getElementById('budgetDisplayContainer').classList.add('hidden');
                totalEl.classList.remove('text-red-500', 'text-green-500');
                totalEl.classList.add('text-brand', 'dark:text-slate-300');
            }
            renderList();
        }

        function resetSort() {
            items = [...initialItems];
            lastSort = { criteria: null, ascending: true };
            updateUI();
        }

        function sortItems(criteria) {
            if (lastSort.criteria === criteria) lastSort.ascending = !lastSort.ascending;
            else { lastSort.criteria = criteria; lastSort.ascending = true; }
            
            items.sort((a, b) => {
                let valA, valB;
                if (criteria === 'name') { valA = a.name.toLowerCase(); valB = b.name.toLowerCase(); }
                else if (criteria === 'shop') { valA = a.shop.toLowerCase(); valB = b.shop.toLowerCase(); }
                else { valA = a.price * a.qty; valB = b.price * b.qty; }
                
                if (valA < valB) return lastSort.ascending ? -1 : 1;
                if (valA > valB) return lastSort.ascending ? 1 : -1;
                return 0;
            });
            updateUI();
        }

        function addItem() {
            const nI = document.getElementById('nameInput'), pI = document.getElementById('priceInput'), qI = document.getElementById('qtyInput'), sI = document.getElementById('shopInput');
            const p = parseFloat(pI.value), q = parseInt(qI.value, 10) || 1, n = nI.value.trim() || `Item ${items.length + 1}`, s = sI.value.trim() || "General";
            if (!isNaN(p) && p >= 0) {
                const newItem = { name: n, shop: s, price: p, qty: Math.max(1, q) };
                items.push(newItem);
                initialItems.push(newItem);
                nI.value = ''; pI.value = ''; qI.value = '1'; sI.value = ''; nI.focus();
                updateUI();
                setTimeout(() => { const p = document.getElementById('listPanel'); if (p) p.scrollTop = p.scrollHeight; }, 50);
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') { if (e.target.id === 'budgetInput') setBudget(); else addItem(); } }
        function setBudget() { const b = parseFloat(document.getElementById('budgetInput').value); if (!isNaN(b) && b > 0) { budget = b; updateUI(); } }
        function editBudget() { const b = prompt("Enter a new budget (£):", budget); if (b !== null) { budget = parseFloat(b); updateUI(); } }
        function renameItem(idx) { const n = prompt("Enter new name:", items[idx].name); if (n) { items[idx].name = n; updateUI(); } }
        function changeShopName(idx) { const s = prompt("Enter new shop:", items[idx].shop); if (s) { items[idx].shop = s; updateUI(); } }
        function repriceItem(idx) { const p = prompt("Enter new price:", items[idx].price); if (p) { items[idx].price = parseFloat(p); updateUI(); } }
        function changeQtyItem(idx) { const q = prompt("Enter new qty:", items[idx].qty); if (q) { items[idx].qty = parseInt(q); updateUI(); } }
        function removeItem(idx) { 
            const itemToRemove = items[idx];
            items.splice(idx, 1); 
            initialItems = initialItems.filter(i => i !== itemToRemove);
            updateUI(); 
        }

        function adjustDynamicText() {
            if (window.innerWidth >= 640) { document.querySelectorAll('.dynamic-name').forEach(el => el.style.fontSize = ''); return; }
            document.querySelectorAll('.dynamic-name').forEach(el => {
                el.style.fontSize = ''; let size = 14; 
                while (el.scrollWidth > el.clientWidth && size > 9) { size -= 0.5; el.style.fontSize = size + 'px'; }
            });
        }

        window.addEventListener('resize', adjustDynamicText);

        function renderList() {
            const panel = document.getElementById('listPanel'), sortControls = document.getElementById('sortControls');
            if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
            panel.innerHTML = '';
            if (items.length === 0) { panel.innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400 italic mt-4 text-sm">Your list is currently empty.</p>'; sortControls.classList.add('hidden'); return; }
            sortControls.classList.remove('hidden');
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'flex flex-row justify-between items-center bg-gray-100 dark:bg-slate-700 p-3 rounded-lg transition-colors hover:bg-gray-200 dark:hover:bg-slate-600 gap-2 cursor-grab active:cursor-grabbing';
                div.innerHTML = `<div class="flex items-center flex-grow min-w-0 gap-1.5 pr-2 pointer-events-auto"><span class="dynamic-name text-sm font-semibold text-brand-dark dark:text-slate-300 cursor-pointer border-b border-dashed border-gray-400 dark:border-gray-500 truncate" onclick="renameItem(${index})">${item.name}</span><span class="flex-shrink-0 text-[11px] sm:text-xs font-medium text-gray-600 dark:text-gray-300 px-1.5 py-0.5 bg-gray-200 dark:bg-slate-600 rounded cursor-pointer" onclick="changeShopName(${index})">${item.shop}</span><span class="flex-shrink-0 text-[11px] sm:text-xs font-medium text-gray-500 dark:text-gray-400 cursor-pointer ml-0.5 px-1 py-0.5 bg-gray-200 dark:bg-slate-600 rounded" onclick="changeQtyItem(${index})">x${item.qty}</span></div><div class="flex items-center gap-2 sm:gap-3 flex-shrink-0 pointer-events-auto"><span class="font-bold text-gray-800 dark:text-gray-200 cursor-pointer border-b border-dashed border-gray-400 dark:border-gray-500 whitespace-nowrap text-xs sm:text-sm" onclick="repriceItem(${index})">£${(item.price * item.qty).toFixed(2)}</span><button onclick="removeItem(${index})" class="bg-red-600 hover:bg-red-700 text-white font-bold p-1 rounded-md text-xs w-5 h-5 flex items-center justify-center">✖</button></div>`;
                panel.appendChild(div);
            });
            if (items.length > 1) {
                sortableInstance = new Sortable(panel, { animation: 150, delay: 400, delayOnTouchOnly: false, fallbackTolerance: 5, ghostClass: 'sortable-ghost', onEnd: (evt) => { const moved = items.splice(evt.oldIndex, 1)[0]; items.splice(evt.newIndex, 0, moved); updateUI(); } });
            }
            setTimeout(adjustDynamicText, 10);
        }

        function saveList() { const data = JSON.stringify({ budget, items }); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' })); a.download = `budget_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
        function importList(e) { const reader = new FileReader(); reader.onload = (e) => { const d = JSON.parse(e.target.result); items = d.items; initialItems = [...items]; budget = d.budget; updateUI(); }; reader.readAsText(e.target.files[0]); }
        updateUI();
    </script>
</body>
</html>
